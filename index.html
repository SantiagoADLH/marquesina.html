<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Marquesina dinámica</title>
<style>
  body {
    margin: 0;
    background: transparent;
    overflow: hidden;
  }

  #marquesina {
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    padding: 10px 0;
    font-size: 28px;
    font-family: Arial, sans-serif;
  }

  #texto {
    display: inline-block;
    padding-left: 100%;
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="marquesina">
  <div id="texto">✨ Bienvenido a nuestro sitio web ✨</div>
</div>

<script>
  const texto = document.getElementById("texto");

  let posicion = window.innerWidth;

  function colorAleatorio() {
    const r = Math.floor(Math.random() * 256);
    const g = Math.floor(Math.random() * 256);
    const b = Math.floor(Math.random() * 256);
    return `rgb(${r},${g},${b})`;
  }

  function animar() {
    posicion -= 2; // velocidad constante

    texto.style.transform = `translateX(${posicion}px)`;

    if (posicion < -texto.offsetWidth) {
      posicion = window.innerWidth;

      // Cambiar a un color completamente aleatorio
      texto.style.color = colorAleatorio();
    }

    requestAnimationFrame(animar);
  }

  // Color inicial
  texto.style.color = colorAleatorio();

  animar();
</script>

</body>
</html>
